name: Deploy Hybrid Site

on:
  push:
    branches: ["master"] # 如果你的主分支叫 main，请改为 main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      # --- 1. 下载仓库代码 ---
      - name: Checkout repository
        uses: actions/checkout@v6

      # --- 2. 设置 Node.js 环境 ---
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # --- 3. 安装并构建 docmd 文档 ---
      - name: Install and Build docmd
        working-directory: ./docmd
        run: |
          npm install
          npm install -g @docmd/core --unsafe-perm
          docmd build

      # --- 4. 合并主站和文档站点 ---
      - name: Assemble Final Site
        run: |
          FINAL_DIR=_final_build
          mkdir -p $FINAL_DIR

          # A. 复制主站资源
          if [ -d demo ]; then
            cp -r demo/* $FINAL_DIR/
          else
            echo "Warning: demo directory not found! Skipping main site copy."
          fi

          # B. 创建文档子目录并复制文档内容
          mkdir -p $FINAL_DIR/documentation
          if [ -d docmd/site ]; then
            cp -r docmd/site/* $FINAL_DIR/documentation/
          else
            echo "Error: docmd/site not found! Build might have failed."
            exit 1
          fi

      # --- 5. 配置 GitHub Pages ---
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_final_build

      # --- 6. 部署到 GitHub Pages ---
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

            # --- 7. 输出访问地址 ---
      - name: Show Pages URL
        run: |
          echo "部署成功！访问地址: ${{ steps.deployment.outputs.page_url }}"

